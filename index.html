                                        className="w-full bg-[#F5F5F7] border border-transparent text-gray-900 rounded-[16px] px-4 h-12 text-sm font-medium outline-none focus:bg-white focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 transition-all"
                                    />
                                </div>
                                <div className="space-y-1.5">
                                    <input 
                                        type="password" 
                                        value={password} 
                                        onChange={(e) => setPassword(e.target.value)}
                                        placeholder="Пароль"
                                        className="w-full bg-[#F5F5F7] border border-transparent text-gray-900 rounded-[16px] px-4 h-12 text-sm font-medium outline-none focus:bg-white focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 transition-all"
                                    />
                                </div>

                                {error && (
                                    <div className="text-red-500 text-xs font-medium text-center bg-red-50 py-2 rounded-xl">
                                        Неверный логин или пароль
                                    </div>
                                )}

                                <button 
                                    type="submit" 
                                    className="w-full flex items-center justify-center gap-2 bg-gray-900 hover:bg-gray-800 text-white rounded-2xl h-12 text-[14px] sm:text-[15px] font-bold shadow-md transition-all focus:outline-none focus:ring-4 focus:ring-gray-500/30 active:scale-[0.98]"
                                >
                                    Управление ценами (Облако)
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            );
        }

        // --- ПАНЕЛЬ АДМИНИСТРАТОРА ---
        function AdminPanel({ initialRawPrices, initialScrap, onSave, onLogout }) {
            const [rawPrices, setRawPrices] = useState(initialRawPrices);
            const [scrap, setScrap] = useState(initialScrap);
            const [saved, setSaved] = useState(false);
            const [isSaving, setIsSaving] = useState(false);
            const [saveError, setSaveError] = useState('');

            useEffect(() => {
                setRawPrices(initialRawPrices);
                setScrap(initialScrap);
            }, [initialRawPrices, initialScrap]);

            const handlePriceChange = (grade, value) => {
                let val = value.replace(/\s/g, '').replace(/,/g, '.');
                if (val === '' || /^\d*\.?\d*$/.test(val)) {
                    setRawPrices(prev => ({...prev, [grade]: val}));
                }
            };

            const handleSave = async () => {
                setIsSaving(true);
                setSaveError('');
                try {
                    await onSave(rawPrices, scrap);
                    setSaved(true);
                    setTimeout(() => setSaved(false), 3000);
                } catch (e) {
                    console.error("Ошибка сохранения в облако:", e);
                    setSaveError("Ошибка сохранения. Проверьте подключение.");
                }
                setIsSaving(false);
            };

            return (
                <div className="min-h-screen flex items-center justify-center bg-[#F5F5F7] px-4 font-sans text-gray-900 py-12">
                    <div className="bg-white p-6 sm:p-10 rounded-[32px] shadow-lg border border-gray-50 w-full max-w-2xl relative overflow-hidden">
                        
                        <div className="absolute top-0 left-0 w-full h-1.5 bg-blue-500"></div>

                        <div className="flex flex-col items-center mb-8">
                            <div className="w-16 h-16 bg-blue-50 rounded-[20px] flex items-center justify-center shadow-sm border border-blue-100 mb-4">
                                <Cloud className="w-8 h-8 text-blue-500" />
                            </div>
                            <h2 className="text-xl sm:text-2xl font-bold tracking-tight text-gray-900 text-center">Облачные цены</h2>
                            <p className="text-xs sm:text-sm text-gray-500 mt-1.5 text-center px-4 max-w-sm">
                                Установленные здесь цены мгновенно синхронизируются со всеми менеджерами.
                            </p>
                        </div>

                        <div className="space-y-6">
                            
                            {/* Блок цен на заготовку */}
                            <div className="bg-[#F5F5F7]/80 p-5 rounded-2xl border border-gray-100/50">
                                <h3 className="text-[13px] font-bold text-gray-800 mb-4 uppercase tracking-wider">Цена заготовки по маркам стали (руб/тн)</h3>
                                <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3">
                                    {STEEL_GRADES.map(grade => (
                                        <div key={grade} className="bg-white p-2 rounded-xl shadow-sm border border-gray-100 flex items-center">
                                            <label className="text-[12px] font-medium text-gray-600 w-20 shrink-0 ml-1">{grade}</label>
                                            <input 
                                                type="text" inputMode="decimal" placeholder="Цена..."
                                                value={formatInputValue(rawPrices[grade] || '')} 
                                                onChange={(e) => handlePriceChange(grade, e.target.value)} 
                                                className="w-full bg-transparent border-none text-gray-900 h-8 text-[14px] font-semibold outline-none text-right placeholder-gray-300" 
                                            />
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* Цена лома */}
                            <div className="bg-[#F5F5F7]/80 p-5 rounded-2xl border border-gray-100/50">
                                <div className="space-y-1.5 max-w-sm mx-auto">
                                    <label className="block text-[13px] font-bold text-gray-800 ml-1 uppercase tracking-wider text-center mb-2">Единая цена лома (руб/тн)</label>
                                    <div className="relative shadow-sm">
                                        <input 
                                            type="text" inputMode="decimal" placeholder="Например: 20000"
                                            value={formatInputValue(scrap)} onChange={(e) => handleNumericInput(e, setScrap)} 
                                            className="w-full bg-white border border-gray-100 text-gray-900 rounded-[16px] pl-4 pr-12 h-14 text-[15px] sm:text-base font-semibold outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 transition-all text-center" 
                                        />
                                        <span className="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 font-medium text-sm">руб</span>
                                    </div>
                                </div>
                            </div>

                            <div className="pt-2 space-y-3 sm:max-w-sm sm:mx-auto">
                                {saveError && <div className="text-red-500 text-sm font-bold text-center">{saveError}</div>}
                                <button 
                                    onClick={handleSave} 
                                    disabled={isSaving}
                                    className={`w-full flex justify-center items-center gap-2 text-white rounded-2xl h-14 text-[15px] font-bold shadow-md transition-all focus:outline-none active:scale-[0.98] ${saved ? 'bg-green-500 shadow-green-500/20' : 'bg-blue-500 hover:bg-blue-600 shadow-blue-500/20'} ${isSaving ? 'opacity-70 pointer-events-none' : ''}`}
                                >
                                    {isSaving ? 'Синхронизация...' : (saved ? '✓ Сохранено в облаке' : 'Сохранить и применить')}
                                </button>
                                
                                <button 
                                    onClick={onLogout} 
                                    className="w-full flex items-center justify-center gap-2 bg-gray-50 hover:bg-gray-100 text-gray-600 rounded-2xl h-12 text-[14px] font-semibold transition-all focus:outline-none"
                                >
                                    <LogOut className="w-4 h-4" />
                                    Выйти
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // --- ГЛАВНЫЙ КАЛЬКУЛЯТОР ---
        function CalculatorApp({ adminRawPrices, adminScrapPrice, onLogout }) {
            const [profileType, setProfileType] = useState('round');
            const [steelGrade, setSteelGrade] = useState('');
            const [selectedTarget, setSelectedTarget] = useState('');
            const [selectedRaw, setSelectedRaw] = useState('');
            const [orderWeight, setOrderWeight] = useState('');
            
            const [lengthInput, setLengthInput] = useState({ value: '6000', source: 'raw' });
            const [orderedLength, setOrderedLength] = useState('6000');
            
            const [frontCoef, setFrontCoef] = useState('1.027');
            const [backCoef, setBackCoef] = useState('1.003');
            
            const [sellPrice, setSellPrice] = useState('');
            
            const [isCopied, setIsCopied] = useState(false);

            const activeData = profileType === 'round' ? ROUND_DATA : HEX_DATA;

            // Определяем актуальную цену заготовки на основе выбранной марки стали
            const currentAdminRawPrice = useMemo(() => {
                return steelGrade && adminRawPrices ? adminRawPrices[steelGrade] || '' : '';
            }, [steelGrade, adminRawPrices]);

            const targetOptions = useMemo(() => {
                const targets = activeData.map(item => item.target);
                return [...new Set(targets)].sort((a, b) => a - b);
            }, [activeData]);

            const rawOptions = useMemo(() => {
                if (!selectedTarget) return [];
                return activeData
                .filter(item => item.target === Number(selectedTarget) && item.raw > item.target)
                .map(item => item.raw)
                .sort((a, b) => a - b);
            }, [selectedTarget, activeData]);

            const currentCoefficient = useMemo(() => {
                if (!selectedTarget || !selectedRaw) return null;
                const match = activeData.find(
                item => item.target === Number(selectedTarget) && item.raw === Number(selectedRaw)
                );
                return match ? match.coef : null;
            }, [selectedTarget, selectedRaw, activeData]);

            useEffect(() => {
                if (selectedTarget && selectedRaw) {
                    if (profileType === 'round') {
                        const target = Number(selectedTarget);
                        const key = `${selectedTarget}_${selectedRaw}`;
                        
                        if (TECH_COEFS_ROUND[key]) {
                            setFrontCoef(TECH_COEFS_ROUND[key][0].toString());
                            setBackCoef(TECH_COEFS_ROUND[key][1].toString());
                        } else if (target > 50) {
                            let fCoef = 1.032;
                            if (target > 50 && target <= 54) fCoef = 1.033;
                            else if (target > 54 && target <= 58) fCoef = 1.034;
                            else if (target > 58) fCoef = 1.035;
                            
                            setFrontCoef(fCoef.toFixed(3));
                            setBackCoef('1.003');
                        } else {
                            setFrontCoef('1.027');
                            setBackCoef('1.003');
                        }
                    } else {
                        setFrontCoef('1.030'); 
                        setBackCoef('1.003');
                    }
                }
            }, [selectedTarget, selectedRaw, profileType]);

            useEffect(() => {
                setSelectedTarget('');
                setSelectedRaw('');
            }, [profileType]);

            useEffect(() => {
                if (rawOptions.length === 1) {
                setSelectedRaw(rawOptions[0].toString());
                } else if (rawOptions.length > 0 && !rawOptions.includes(Number(selectedRaw))) {
                setSelectedRaw('');
                }
            }, [selectedTarget, rawOptions]);

            const currentDrawCoef = useMemo(() => {
                if (!selectedTarget || !selectedRaw) return null;
                if (profileType === 'round') {
                return Math.pow(Number(selectedRaw), 2) / Math.pow(Number(selectedTarget), 2);
                } else {
                return (Number(selectedTarget) === 48 && Number(selectedRaw) === 56) ? 1.22 : 1.23;
                }
            }, [selectedTarget, selectedRaw, profileType]);

            const displayedRawLength = lengthInput.source === 'raw' 
                ? lengthInput.value 
                : (lengthInput.value && currentDrawCoef ? (Number(lengthInput.value) / currentDrawCoef).toFixed(1) : '');

            const displayedTargetLength = lengthInput.source === 'target' 
                ? lengthInput.value 
                : (lengthInput.value && currentDrawCoef ? (Number(lengthInput.value) * currentDrawCoef).toFixed(1) : '');

            const totalTechCoef = useMemo(() => {
                const f = Number(frontCoef) || 1;
                const b = Number(backCoef) || 1;
                return f * b;
            }, [frontCoef, backCoef]);

            const lengthAfterTechEnds = useMemo(() => {
                const draw = Number(displayedTargetLength);
                if (!isNaN(draw) && draw > 0 && totalTechCoef > 0) {
                    return (draw / totalTechCoef).toFixed(1);
                }
                return '';
            }, [displayedTargetLength, totalTechCoef]);

            const techEndsMm = useMemo(() => {
                const draw = Number(displayedTargetLength);
                const after = Number(lengthAfterTechEnds);
                if (!isNaN(draw) && !isNaN(after) && draw > after) {
                    return (draw - after).toFixed(1);
                }
                return '';
            }, [displayedTargetLength, lengthAfterTechEnds]);

            const piecesPerBar = useMemo(() => {
                if (lengthAfterTechEnds && orderedLength) {
                const usable = Number(lengthAfterTechEnds);
                const order = Number(orderedLength);
                return (order > 0 && usable >= order) ? Math.floor(usable / order) : 0;
                }
                return 0;
            }, [lengthAfterTechEnds, orderedLength]);

            const remnantLength = useMemo(() => {
                if (lengthAfterTechEnds && orderedLength) {
                const usable = Number(lengthAfterTechEnds);
                const order = Number(orderedLength);
                if (isNaN(usable) || isNaN(order)) return '';
                if (order > usable) return (usable - order).toFixed(1);
                return (usable - (order * piecesPerBar)).toFixed(1);
                }
                return '';
            }, [lengthAfterTechEnds, orderedLength, piecesPerBar]);

            const optimalLengths = useMemo(() => {
                if (!lengthAfterTechEnds) return [];
                const target = Number(lengthAfterTechEnds);
                if (isNaN(target) || target <= 0) return [];
                
                const options = [];
                for (let i = 1; i <= 20; i++) {
                    const optLen = Math.floor(target / i) - 5;
                    if (optLen >= 2500 && optLen <= 6500) {
                        options.push({ pieces: i, length: optLen });
                    }
                }
                
                const currentOrder = Number(orderedLength);
                if (!isNaN(currentOrder) && currentOrder > 0) {
                    options.sort((a, b) => Math.abs(a.length - currentOrder) - Math.abs(b.length - currentOrder));
                }

                return options.slice(0, 4); 
            }, [lengthAfterTechEnds, orderedLength]);

            const requiredWeight = useMemo(() => {
                if (!orderWeight || !currentCoefficient) return null;
                const val = Number(orderWeight) * currentCoefficient;
                return isNaN(val) ? null : val.toFixed(2);
            }, [orderWeight, currentCoefficient]);

            const orderedBarWeight = useMemo(() => {
                if (!orderedLength || Number(orderedLength) <= 0 || !selectedTarget) return null;
                const lengthMm = Number(orderedLength);
                const sizeMm = Number(selectedTarget);
                const area = profileType === 'round' 
                ? (Math.PI * Math.pow(sizeMm, 2)) / 4 
                : (Math.sqrt(3) / 2) * Math.pow(sizeMm, 2);
                const weightKg = area * lengthMm * 0.00000785;
                return { tons: (weightKg / 1000).toFixed(5), kg: weightKg.toFixed(2) };
            }, [orderedLength, selectedTarget, profileType]);

            const piecesPerTon = useMemo(() => {
                if (!orderedBarWeight || Number(orderedBarWeight.kg) === 0) return 0;
                return Math.floor(1000 / Number(orderedBarWeight.kg));
            }, [orderedBarWeight]);

            const totalPiecesInOrder = useMemo(() => {
                if (!orderWeight || !orderedBarWeight || Number(orderedBarWeight.kg) === 0) return 0;
                return Math.floor((Number(orderWeight) * 1000) / Number(orderedBarWeight.kg));
            }, [orderWeight, orderedBarWeight]);

            const remnantWeight = useMemo(() => {
                if (!remnantLength || Number(remnantLength) <= 0 || !selectedTarget) return null;
                const lengthMm = Number(remnantLength);
                const sizeMm = Number(selectedTarget);
                const area = profileType === 'round' 
                ? (Math.PI * Math.pow(sizeMm, 2)) / 4 
                : (Math.sqrt(3) / 2) * Math.pow(sizeMm, 2);
                const weightKg = area * lengthMm * 0.00000785;
                return { tons: (weightKg / 1000).toFixed(5), kg: weightKg.toFixed(2) };
            }, [remnantLength, selectedTarget, profileType]);

            const remnantValue = useMemo(() => {
                if (!remnantWeight || !currentAdminRawPrice) return null;
                const val = Number(remnantWeight.tons) * Number(currentAdminRawPrice);
                return isNaN(val) ? null : val.toFixed(2);
            }, [remnantWeight, currentAdminRawPrice]);

            const advancedRemnantStats = useMemo(() => {
                const hasRemnant = remnantLength && Number(remnantLength) > 0 && orderedLength && Number(orderedLength) > 0 && piecesPerBar > 0;
                const hasTechScrap = techEndsMm && Number(techEndsMm) > 0;
                
                if (!hasRemnant && !hasTechScrap) return null;
                
                const productMm = (orderedLength && piecesPerBar > 0) ? Number(orderedLength) * piecesPerBar : 0;
                if (productMm === 0) return null;

                const remMm = hasRemnant ? Number(remnantLength) : 0;
                const techMm = hasTechScrap ? Number(techEndsMm) : 0;

                const totalScrapMm = remMm + techMm;
                const totalRatio = totalScrapMm / productMm;
                
                const kgPerTon = totalRatio * 1000;
                const tonsPerTon = totalRatio;
                const valuePerTon = currentAdminRawPrice ? totalRatio * Number(currentAdminRawPrice) : null;
                
                let orderScrapTons = 0, orderScrapValue = null;
                
                if (orderWeight && Number(orderWeight) > 0) {
                    orderScrapTons = totalRatio * Number(orderWeight);
                    if (currentAdminRawPrice) orderScrapValue = orderScrapTons * Number(currentAdminRawPrice);
                }
                
                return {
                    kgPerTon: kgPerTon.toFixed(1), 
                    tonsPerTon: tonsPerTon.toFixed(3),
                    valuePerTon: valuePerTon !== null ? valuePerTon.toFixed(2) : null,
                    orderScrapTons: orderScrapTons.toFixed(3),
                    orderScrapValue: orderScrapValue !== null ? orderScrapValue.toFixed(2) : null
                };
            }, [remnantLength, orderedLength, currentAdminRawPrice, orderWeight, piecesPerBar, techEndsMm]);

            const commercialStats = useMemo(() => {
                if (!sellPrice || !currentAdminRawPrice || !orderWeight) return null;
                const sPrice = Number(sellPrice);
                const rPrice = Number(currentAdminRawPrice);
                const scPrice = Number(adminScrapPrice) || 0;
                const weight = Number(orderWeight);
                if (isNaN(sPrice) || isNaN(rPrice) || isNaN(weight)) return null;

                const lossesPerTon = advancedRemnantStats && advancedRemnantStats.valuePerTon ? Number(advancedRemnantStats.valuePerTon) : 0;
                const scrapTonsPerTon = advancedRemnantStats && advancedRemnantStats.tonsPerTon ? Number(advancedRemnantStats.tonsPerTon) : 0;
                
                const scrapRevenuePerTon = scrapTonsPerTon * scPrice;
                const netLossesPerTon = lossesPerTon - scrapRevenuePerTon;

                const profitPerTon = sPrice - rPrice - netLossesPerTon;
                const profitTotal = profitPerTon * weight;
                
                const marginPercent = sPrice > 0 ? (profitPerTon / sPrice) * 100 : 0;
                
                return {
                lossesPerTon,
                scrapRevenuePerTon,
                netLossesPerTon,
                profitPerTon, 
                profitTotal,
                marginPercent,
                sellTotal: sPrice * weight,
                sellTotalVat: sPrice * weight * 1.22,
                rawTotal: rPrice * weight,
                lossesTotal: lossesPerTon * weight,
                scrapRevenueTotal: scrapRevenuePerTon * weight,
                netLossesTotal: netLossesPerTon * weight,
                isPositive: profitTotal >= 0
                };
            }, [sellPrice, currentAdminRawPrice, adminScrapPrice, orderWeight, advancedRemnantStats]);

            const formatCurrency = (value) => {
                if (value === null || value === undefined || isNaN(Number(value))) return '0,00';
                return new Intl.NumberFormat('ru-RU', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(Number(value));
            };

            const formatInputValue = (value) => {
                if (!value) return '';
                const parts = value.toString().split('.');
                parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
                return parts.join('.');
            };

            const handleNumericInput = (e, setter) => {
                let val = e.target.value.replace(/\s/g, '').replace(/,/g, '.');
                if (val === '' || /^\d*\.?\d*$/.test(val)) {
                setter(val);
                }
            };

            const handleReset = () => {
                setProfileType('round'); setSteelGrade(''); setSelectedTarget(''); setSelectedRaw('');
                setOrderWeight(''); setLengthInput({ value: '6000', source: 'raw' });
                setOrderedLength('6000'); setSellPrice('');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const handlePrint = () => {
                window.print();
            };

            const handleCopy = () => {
                let text = `Детали расчета (ООО "ЗМК Арсенал")\n`;
                text += `-----------------------------------\n`;
                if (steelGrade) text += `Марка стали: ${steelGrade}\n`;
                text += `Профиль: ${profileType === 'round' ? 'Круг' : 'Шестигранник'} ${selectedTarget || '?'} мм\n`;
                text += `Длина (отгрузка): ${orderedLength || '?'} мм\n`;
                text += `Объем заказа: ${orderWeight || '?'} тонн\n\n`;
                if (totalTechCoef > 1) {
                    text += `Тех. концы: ${techEndsMm} мм (Перед: ${frontCoef}, Зад: ${backCoef})\n`;
                    text += `Длина после удаления: ${lengthAfterTechEnds} мм\n`;
                }
                text += `Сырье к закупке: ${requiredWeight || '?'} тонн (Заготовка ${selectedRaw || '?'} мм)\n`;
                
                if (commercialStats) {
                    text += `\nКоммерция:\n`;
                    text += `Сумма заказа (без НДС): ${formatCurrency(commercialStats.sellTotal)} руб.\n`;
                    text += `Сумма заказа (с НДС 22%): ${formatCurrency(commercialStats.sellTotalVat)} руб.\n`;
                }

                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand("copy");
                    setIsCopied(true);
                    setTimeout(() => setIsCopied(false), 2000);
                } catch (err) {
                    console.error("Ошибка копирования", err);
                }
                document.body.removeChild(textArea);
            };

            return (
                <div className="min-h-screen py-4 sm:py-8 lg:py-12 px-3 sm:px-6 font-sans text-gray-900">
                <div className="max-w-[1024px] mx-auto space-y-5 sm:space-y-8">
                    
                    {/* ШАПКА */}
                    <header className="bg-white/80 backdrop-blur-xl sticky top-2 sm:top-4 z-50 rounded-[24px] sm:rounded-[28px] px-4 py-3 sm:px-8 sm:py-4 shadow-[0_4px_24px_rgba(0,0,0,0.04)] border border-gray-100 flex flex-col sm:flex-row items-center justify-between gap-4 print-hide">
                        <div className="flex items-center gap-3 sm:gap-4 text-center sm:text-left w-full sm:w-auto justify-center sm:justify-start">
                            <div className="w-10 h-10 sm:w-12 sm:h-12 bg-blue-500 rounded-[14px] sm:rounded-[18px] flex items-center justify-center shadow-sm shrink-0">
                            <Calculator className="w-5 h-5 sm:w-6 sm:h-6 text-white" />
                            </div>
                            <div>
                            <h1 className="text-base sm:text-xl font-semibold tracking-tight text-gray-900 leading-tight">
                                Калькулятор для менеджеров
                            </h1>
                            <p className="text-[11px] sm:text-sm font-medium text-gray-500 mt-0.5">
                                ООО "ЗМК Арсенал"
                            </p>
                            </div>
                        </div>
                        
                        <div className="flex flex-wrap items-center justify-center gap-2 sm:gap-3 w-full sm:w-auto">
                            <button onClick={handleCopy} className={`flex-1 sm:flex-none flex items-center justify-center gap-2 px-4 py-2 sm:py-2.5 rounded-full transition-colors font-medium text-[13px] sm:text-sm focus:outline-none focus:ring-2 focus:ring-blue-300 active:scale-95 ${isCopied ? 'bg-green-100 text-green-700' : 'bg-blue-50 hover:bg-blue-100 text-blue-700'}`}>
                                {isCopied ? <Check className="w-4 h-4" /> : <Copy className="w-4 h-4" />}
                                <span className="hidden sm:inline">{isCopied ? 'Скопировано' : 'Скопировать'}</span>
                            </button>
                            <button onClick={handlePrint} className="flex items-center justify-center gap-2 px-4 py-2 sm:py-2.5 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-full transition-colors font-medium text-[13px] sm:text-sm focus:outline-none focus:ring-2 focus:ring-gray-300 active:scale-95">
                                <Printer className="w-4 h-4" />
                            </button>
                            <button onClick={handleReset} className="flex items-center justify-center gap-2 px-4 py-2 sm:py-2.5 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-full transition-colors font-medium text-[13px] sm:text-sm focus:outline-none focus:ring-2 focus:ring-gray-300 active:scale-95">
                                <RotateCcw className="w-4 h-4" />
                            </button>
                            <div className="w-px h-8 bg-gray-200 mx-1 hidden sm:block"></div>
                            <button onClick={onLogout} className="flex items-center justify-center gap-2 px-4 py-2 sm:py-2.5 bg-red-50 hover:bg-red-100 text-red-600 rounded-full transition-colors font-medium text-[13px] sm:text-sm focus:outline-none focus:ring-2 focus:ring-red-300 active:scale-95">

                                <span className="hidden sm:inline">Выйти</span>
                            </button>

                            <Circle className="w-4 h-4" /> Круг
                            </button>
                            <button 
                            onClick={() => setProfileType('hex')} 
                            className={`flex-1 py-2 px-3 rounded-[10px] flex items-center justify-center gap-2 text-[13px] sm:text-sm font-semibold transition-all duration-200 ${profileType === 'hex' ? 'bg-white text-gray-900 shadow-[0_3px_8px_rgba(0,0,0,0.12)]' : 'text-gray-500 hover:text-gray-700'}`}

                            <Hexagon className="w-4 h-4" /> Шестигранник
                            </button>
                        </div>
