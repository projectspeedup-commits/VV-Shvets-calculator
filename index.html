                            <div className="space-y-1.5">
                            <label className="block text-[12px] sm:text-[13px] font-medium text-gray-500 ml-1 leading-tight">Марка стали</label>
                            <div className="relative">
                                <select 
                                value={steelGrade} 
                                onChange={(e) => setSteelGrade(e.target.value)} 
                                className="w-full bg-[#F5F5F7] border border-transparent text-gray-900 rounded-[16px] sm:rounded-2xl px-4 h-12 sm:h-14 text-[15px] sm:text-base font-semibold outline-none focus:bg-white focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 transition-all appearance-none cursor-pointer"
                                >
                                <option value="" disabled>Выберите марку...</option>
                                {STEEL_GRADES.map(grade => <option key={grade} value={grade}>{grade}</option>)}
                                </select>
                                <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-gray-400 print-hide">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="m6 9 6 6 6-6"/></svg>
                                </div>
                            </div>
                            </div>

                            <div className="space-y-1.5">
                            <label className="block text-[12px] sm:text-[13px] font-medium text-gray-500 ml-1 leading-tight">Готовый пруток (мм)</label>
                            <div className="relative">
                                <select 
                                value={selectedTarget} 
                                onChange={(e) => setSelectedTarget(e.target.value)} 
                                className="w-full bg-[#F5F5F7] border border-transparent text-gray-900 rounded-[16px] sm:rounded-2xl px-4 h-12 sm:h-14 text-[15px] sm:text-base font-semibold outline-none focus:bg-white focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 transition-all appearance-none cursor-pointer"
                                >
                                <option value="" disabled>Размер...</option>
                                {targetOptions.map(size => <option key={size} value={size}>{size}</option>)}
                                </select>
                                <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-gray-400 print-hide">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="m6 9 6 6 6-6"/></svg>
                                </div>
                            </div>
                            </div>

                            <div className="space-y-1.5">
                            <label className="block text-[12px] sm:text-[13px] font-medium text-gray-500 ml-1 leading-tight">Заготовка (мм)</label>
                            <div className="relative">
                                <select 
                                value={selectedRaw} 
                                onChange={(e) => setSelectedRaw(e.target.value)} 
                                disabled={!selectedTarget} 
                                className="w-full bg-[#F5F5F7] border border-transparent text-gray-900 rounded-[16px] sm:rounded-2xl px-4 h-12 sm:h-14 text-[15px] sm:text-base font-semibold outline-none focus:bg-white focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 transition-all appearance-none disabled:opacity-50 cursor-pointer"
                                >
                                <option value="" disabled>{selectedTarget ? "Выбор..." : "Ожидание"}</option>
                                {rawOptions.map(size => <option key={size} value={size}>{size}</option>)}
                                </select>
                                <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-gray-400 print-hide">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="m6 9 6 6 6-6"/></svg>
                                </div>
                            </div>
                            </div>

                            <div className="space-y-1.5">
                            <label className="block text-[12px] sm:text-[13px] font-medium text-gray-500 ml-1 leading-tight">Объем заказа</label>
                            <div className="relative">
                                <input 
                                type="text" inputMode="decimal" placeholder="5" 
                                value={orderWeight} onChange={(e) => handleNumericInput(e, setOrderWeight)} 
                                className="w-full bg-[#F5F5F7] border border-transparent text-gray-900 rounded-[16px] sm:rounded-2xl pl-4 pr-12 h-12 sm:h-14 text-[15px] sm:text-base font-semibold outline-none focus:bg-white focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 transition-all placeholder-gray-400" 
                                />
                                <span className="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 font-medium text-[13px] sm:text-sm">тонн</span>
                            </div>
                            </div>

                            <div className="space-y-1.5">
                            <label className="block text-[12px] sm:text-[13px] font-bold text-gray-500 ml-1 leading-tight">Цена заготовки за 1 тн (Облако)</label>
                            <div className="relative">
                                <input 
                                type="text" readOnly
                                value={formatInputValue(currentAdminRawPrice)} 
                                placeholder={steelGrade ? "Не задана" : "Выберите марку"}
                                className="w-full bg-blue-50 border border-transparent text-blue-900 rounded-[16px] sm:rounded-2xl pl-4 pr-12 h-12 sm:h-14 text-[15px] sm:text-base font-semibold outline-none cursor-default placeholder-blue-300" 
                                />
                                <span className="absolute right-4 top-1/2 -translate-y-1/2 text-blue-400 font-medium text-[13px] sm:text-sm">руб</span>
                            </div>
                            </div>

                            <div className="space-y-1.5">
                            <label className="block text-[12px] sm:text-[13px] font-bold text-gray-500 ml-1 leading-tight">Цена лома за 1 т (Облако)</label>
                            <div className="relative">
                                <input 
                                type="text" readOnly
                                value={formatInputValue(adminScrapPrice)} 
                                className="w-full bg-blue-50 border border-transparent text-blue-900 rounded-[16px] sm:rounded-2xl pl-4 pr-12 h-12 sm:h-14 text-[15px] sm:text-base font-semibold outline-none cursor-default" 
                                />
                                <span className="absolute right-4 top-1/2 -translate-y-1/2 text-blue-400 font-medium text-[13px] sm:text-sm">руб</span>
                            </div>
                            </div>
                        </div>
                    </section>

                    {/* СЕКЦИЯ 2: РАСКРОЙ И ОСТАТКИ */}
                    <section className="bg-white rounded-[24px] sm:rounded-[32px] p-5 sm:p-8 lg:p-10 shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-gray-50 space-y-5 sm:space-y-8 print-shadow-none">
                        <div className="flex items-center gap-3">
                            <div className="p-2 bg-blue-50 text-blue-500 rounded-full print-hide">
                            <Ruler className="w-4 h-4 sm:w-5 sm:h-5" />
                            </div>
                            <h2 className="text-lg sm:text-xl font-semibold tracking-tight text-gray-900">Раскрой и остатки</h2>
                        </div>

                        {/* Блок 2.1: Длина вытяжки */}
                        <div className="grid grid-cols-1 md:grid-cols-[1fr_auto_1fr] gap-3 sm:gap-6 items-center bg-[#F5F5F7]/60 p-4 sm:p-6 rounded-2xl sm:rounded-3xl border border-gray-100/50 print-shadow-none">
                            <div className="space-y-1.5 w-full">
                            <label className="block text-[12px] sm:text-[13px] font-medium text-gray-500 ml-1">Длина заготовки</label>
                            <div className="relative">
                                <input 
                                type="text" inputMode="numeric" value={displayedRawLength} onChange={(e) => handleNumericInput(e, (val) => setLengthInput({ value: val, source: 'raw' }))} disabled={!selectedTarget} 
                                className="w-full bg-white border border-transparent text-gray-900 rounded-[16px] sm:rounded-2xl pl-4 pr-12 h-12 sm:h-14 text-[15px] sm:text-lg font-semibold outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 transition-all disabled:bg-transparent" 
                                />
                                <span className="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 font-medium text-[13px] sm:text-sm">мм</span>
                            </div>
                            </div>
                            
                            <ArrowRight className="w-5 h-5 sm:w-6 sm:h-6 text-gray-300 hidden md:block shrink-0 mx-2" />
                            <ArrowRight className="w-5 h-5 sm:w-6 sm:h-6 text-gray-300 md:hidden rotate-90 mx-auto my-1" />

                            <div className="space-y-1.5 w-full">
                            <label className="block text-[12px] sm:text-[13px] font-medium text-gray-500 ml-1">Длина вытяжки</label>
                            <div className="relative">
                                <input 
                                type="text" inputMode="numeric" value={displayedTargetLength} 
                                onChange={(e) => handleNumericInput(e, (val) => setLengthInput({ value: val, source: 'target' }))}
                                disabled={!selectedTarget}
                                className="w-full bg-white border border-transparent text-blue-600 rounded-[16px] sm:rounded-2xl pl-4 pr-12 h-12 sm:h-14 text-[15px] sm:text-lg font-semibold outline-none focus:ring-2 focus:ring-blue-500/40 focus:border-blue-500 transition-all shadow-[0_2px_10px_rgba(0,0,0,0.02)] disabled:bg-transparent print-shadow-none" 
                                />
                                <span className="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 font-medium text-[13px] sm:text-sm">мм</span>
                            </div>
                            </div>
                        </div>

                        {/* Блок 2.2: Технологическая обрезь */}
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-3 sm:gap-4 items-start bg-indigo-50/60 p-4 sm:p-6 rounded-2xl sm:rounded-3xl border border-indigo-100/50 print-shadow-none mt-4 sm:mt-6">
                            <div className="space-y-1.5 w-full">
                                <label className="block text-[11px] sm:text-[12px] font-medium text-indigo-900/70 ml-1">Коэфф. (передний)</label>
                                <div className="relative">
                                    <input 
                                    type="text" readOnly value={formatInputValue(frontCoef)} 
                                    className="w-full bg-indigo-100/50 border border-transparent text-indigo-900 rounded-[12px] sm:rounded-[16px] px-3 h-10 sm:h-12 text-[14px] sm:text-base font-semibold outline-none cursor-default shadow-[0_2px_10px_rgba(0,0,0,0.02)]" 
                                    />
                                </div>
                            </div>

                            <div className="space-y-1.5 w-full">
                                <label className="block text-[11px] sm:text-[12px] font-medium text-indigo-900/70 ml-1">Коэфф. (задний)</label>
                                <div className="relative">
                                    <input 
                                    type="text" readOnly value={formatInputValue(backCoef)} 
                                    className="w-full bg-indigo-100/50 border border-transparent text-indigo-900 rounded-[12px] sm:rounded-[16px] px-3 h-10 sm:h-12 text-[14px] sm:text-base font-semibold outline-none cursor-default shadow-[0_2px_10px_rgba(0,0,0,0.02)]" 
                                    />
                                </div>
                            </div>

                            <div className="space-y-1.5 w-full">
                                <label className="block text-[11px] sm:text-[12px] font-medium text-indigo-900/70 ml-1">Тех. концы</label>
                                <div className="relative">
                                    <input 
                                    type="text" readOnly value={techEndsMm} 
                                    className="w-full bg-indigo-100/50 border border-transparent text-indigo-900 rounded-[12px] sm:rounded-[16px] pl-3 pr-10 h-10 sm:h-12 text-[14px] sm:text-base font-bold outline-none cursor-default" 
                                    />
                                    <span className="absolute right-3 top-1/2 -translate-y-1/2 text-indigo-500 font-medium text-[12px]">мм</span>
                                </div>
                            </div>

                            <div className="space-y-1.5 w-full">
                                <label className="block text-[11px] sm:text-[12px] font-bold text-indigo-900 ml-1">Длина после удаления</label>
                                <div className="relative">
                                    <input 
                                    type="text" readOnly value={lengthAfterTechEnds} 
                                    className="w-full bg-white border border-indigo-200 text-indigo-700 rounded-[12px] sm:rounded-[16px] pl-3 pr-10 h-10 sm:h-12 text-[15px] sm:text-lg font-bold outline-none shadow-[0_2px_10px_rgba(0,0,0,0.05)] cursor-default" 
                                    />
                                    <span className="absolute right-3 top-1/2 -translate-y-1/2 text-indigo-500 font-bold text-[12px]">мм</span>
                                </div>
                            </div>
                        </div>

                        {/* Блок 2.3: Требуемая длина */}
                        <div className="bg-blue-50/50 p-4 sm:p-8 rounded-2xl sm:rounded-3xl flex flex-col sm:flex-row sm:items-center justify-between gap-4 sm:gap-6 border border-blue-100/30">
                            <div>
                            <label className="block text-[15px] sm:text-lg font-semibold text-gray-900 tracking-tight">Требуемая длина</label>
                            <p className="text-[12px] sm:text-sm text-gray-500 mt-1">Отгрузка заказчику</p>
                            </div>
                            <div className="relative w-full sm:w-1/3 shrink-0">
                            <input 
                                type="text" inputMode="numeric" value={orderedLength} onChange={(e) => handleNumericInput(e, setOrderedLength)} 
                                className="w-full bg-white border border-transparent text-gray-900 rounded-[16px] sm:rounded-2xl px-4 sm:px-5 h-14 sm:h-16 text-lg sm:text-2xl font-semibold outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 shadow-sm transition-all print-shadow-none" 
                            />
                            <span className="absolute right-4 sm:right-5 top-1/2 -translate-y-1/2 text-gray-400 font-medium text-[13px] sm:text-base">мм</span>
                            </div>
                        </div>

                        {/* Блок 2.4: Безотходный раскрой */}
                        {optimalLengths.length > 0 && Number(lengthAfterTechEnds) > 0 && (
                            <div className="bg-[#F5F5F7] rounded-2xl sm:rounded-3xl p-4 sm:p-6 border border-gray-100 mt-4 sm:mt-6 print-hide">
                            <div className="flex flex-col sm:flex-row items-start gap-3 sm:gap-4">
                                <div className="p-2 bg-white rounded-full shadow-sm shrink-0 hidden sm:block">
                                <Info className="w-4 h-4 sm:w-5 sm:h-5 text-blue-500" />
                                </div>
                                <div className="space-y-3 w-full">
                                <div>
                                    <div className="flex items-center gap-2">
                                    <Info className="w-4 h-4 text-blue-500 sm:hidden" />
                                    <p className="text-[13px] sm:text-sm font-bold text-gray-900">
                                        Безотходный раскрой (ГОСТ 2500–6500 мм)
                                    </p>
                                    </div>
                                    <p className="text-[11px] sm:text-[12px] text-gray-500 mt-1.5 sm:mt-1 leading-relaxed">
                                    Закономерность расчета: <b className="text-gray-700">Оптимальная длина = (Длина после удаления тех. концов / Кол-во частей) − 5 мм на рез</b>. 
                                    </p>
                                </div>
                                
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-2.5 sm:gap-3 pt-1">
                                    {optimalLengths.map((opt, i) => (
                                    <button 
                                        key={i} 
                                        onClick={() => setOrderedLength(opt.length.toString())} 
                                        className="bg-white hover:bg-blue-50 text-left p-3 sm:p-4 rounded-xl sm:rounded-2xl border border-gray-200/60 shadow-sm transition-all active:scale-[0.98] group flex items-center justify-between"
                                    >
                                        <div>
                                        <div className="font-bold text-blue-600 text-[14px] sm:text-base">{opt.length} мм</div>
                                        <div className="text-[10px] sm:text-[11px] text-gray-500 mt-1 font-medium">
                                            На {opt.pieces} {opt.pieces === 1 ? 'часть' : (opt.pieces > 1 && opt.pieces < 5) ? 'части' : 'частей'} <span className="sm:hidden"></span>(Остаток / {opt.pieces} − 5 мм)
                                        </div>
                                        </div>
                                        <div className="w-6 h-6 sm:w-7 sm:h-7 rounded-full bg-gray-50 flex items-center justify-center group-hover:bg-blue-100 transition-colors shrink-0 ml-2 sm:ml-3">
                                        <ArrowRight className="w-3 h-3 sm:w-3.5 sm:h-3.5 text-gray-400 group-hover:text-blue-500" />
                                        </div>
                                    </button>
                                    ))}
                                </div>
                                </div>
                            </div>
                            </div>
                        )}

                        {/* Блок 2.5: Деловой остаток и потери */}
                        {orderedLength && Number(orderedLength) > 0 && (
                            <div className="bg-green-50/80 p-4 sm:p-8 rounded-2xl sm:rounded-3xl border border-green-100 mt-4 sm:mt-0">
                            
                            {/* Деловой остаток - показываем только если он есть */}
                            {remnantLength && Number(remnantLength) > 0 && piecesPerBar > 0 && (
                                <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 sm:gap-6 mb-4 sm:mb-6 pb-4 sm:pb-6 border-b border-green-200/60">
                                    <div>
                                    <div className="flex items-center gap-2 mb-1 sm:mb-1.5">
                                        <h4 className="text-green-800 text-[12px] sm:text-sm font-medium">Деловой остаток</h4>
                                        <span className="text-[10px] sm:text-xs font-semibold bg-green-200/60 text-green-700 px-2 py-0.5 rounded-md print-hide">
                                            после реза {piecesPerBar} шт.
                                        </span>
                                    </div>
                                    <div className="flex items-baseline gap-2">
                                        <p className="text-xl sm:text-3xl font-semibold text-green-700 tracking-tight">{remnantLength} мм</p>
                                        {remnantWeight && <p className="text-green-600/80 font-medium text-[11px] sm:text-sm">~ {remnantWeight.tons} т ({remnantWeight.kg} кг)</p>}
                                    </div>
                                    </div>
                                    {remnantValue && currentAdminRawPrice && (
                                    <div className="bg-white/70 px-4 py-2.5 sm:px-5 sm:py-3 rounded-[12px] sm:rounded-[16px] w-full md:w-auto">
                                        <span className="block text-[10px] sm:text-xs text-green-600 font-medium mb-0.5">Убыток на пруток</span>
                                        <span className="text-[15px] sm:text-lg font-semibold text-green-800">{new Intl.NumberFormat('ru-RU').format(remnantValue)} руб.</span>
                                    </div>
                                    )}
                                </div>
                            )}
                            
                            {/* Статистика потерь */}
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4 sm:gap-6">
                                <div className="space-y-1 sm:space-y-1.5 md:border-r border-green-200/50 md:pr-4">
                                    <span className="text-[11px] sm:text-xs text-green-600 font-medium block leading-tight">Прутков в 1 тонне готовой продукции</span>
                                    <div className="text-base sm:text-xl font-semibold text-green-800 tracking-tight mt-0.5 sm:mt-1">
                                    {`~ ${piecesPerTon || 0} шт.`}
                                    </div>
                                    {orderedBarWeight && <div className="text-[10px] sm:text-xs text-green-600/70 mt-0.5">Вес 1 прутка: {orderedBarWeight.kg} кг</div>}
                                    {orderWeight && orderedBarWeight ? (
                                    <div className="text-[10px] sm:text-xs text-green-800 font-semibold bg-green-200/50 inline-block px-2 py-1 rounded-md mt-1.5">
                                        Во всем заказе: ~ {new Intl.NumberFormat('ru-RU').format(totalPiecesInOrder || 0)} шт.
                                    </div>
                                    ) : null}
                                </div>

                                {advancedRemnantStats && (
                                    <>
                                    <div className="space-y-1 sm:space-y-1.5 md:border-r border-green-200/50 md:pr-4 pt-3 border-t md:border-t-0 md:pt-0">
                                        <span className="text-[11px] sm:text-xs text-green-600 font-medium block leading-tight">Потери на производство 1 тонны готовой продукции</span>
                                        <div className="text-base sm:text-xl font-semibold text-green-800 tracking-tight mt-0.5 sm:mt-1">
                                        {currentAdminRawPrice && advancedRemnantStats.valuePerTon !== null ? `${formatCurrency(advancedRemnantStats.valuePerTon)} руб.` : <span className="text-[12px] sm:text-[13px] text-green-600/60 font-normal">Укажите марку стали</span>}
                                        </div>
                                        {currentAdminRawPrice && advancedRemnantStats.tonsPerTon !== null && (
                                            <div className="text-[10px] sm:text-xs text-green-600/70 mt-0.5">
                                                Масса отхода: {advancedRemnantStats.tonsPerTon} т
                                            </div>
                                        )}
                                    </div>

                                    <div className="space-y-1 sm:space-y-1.5 pt-3 border-t border-green-200/50 md:border-t-0 md:pt-0">
                                        <span className="text-[11px] sm:text-xs text-green-600 font-medium block leading-tight">Потери на весь заказ</span>
                                        <div className="text-base sm:text-xl font-semibold text-green-800 tracking-tight mt-0.5 sm:mt-1">
                                        {currentAdminRawPrice && orderWeight && advancedRemnantStats.orderScrapValue !== null ? `${formatCurrency(advancedRemnantStats.orderScrapValue)} руб.` : <span className="text-[12px] sm:text-[13px] text-green-600/60 font-normal">Укажите вес и марку</span>}
                                        </div>
                                        {currentAdminRawPrice && orderWeight && advancedRemnantStats.orderScrapTons !== null && <div className="text-[10px] sm:text-xs text-green-600/70 mt-0.5">Масса отхода: {advancedRemnantStats.orderScrapTons} т</div>}
                                    </div>
                                    </>
                                )}
                            </div>

                            </div>
                        )}

                        {/* Блок 2.6: Предупреждение о превышении длины */}
                        {remnantLength && Number(remnantLength) < 0 && (
                            <div className="p-3 sm:p-5 bg-orange-50 border border-orange-100 rounded-xl sm:rounded-2xl flex items-start sm:items-center gap-3 sm:gap-4 mt-4 sm:mt-0 print-hide">
                            <AlertTriangle className="w-5 h-5 sm:w-6 sm:h-6 text-orange-500 shrink-0 mt-0.5 sm:mt-0" />
                            <div>
                                <p className="text-[12px] sm:text-sm font-semibold text-orange-900 mb-0.5">Длина превышает вытяжку</p>
                                <p className="text-[10px] sm:text-xs text-orange-800/80 leading-relaxed">Из заготовки {displayedRawLength}мм получится пруток длиной {displayedTargetLength} мм. Заказанная длина {orderedLength} мм не поместится.</p>
                            </div>
                            </div>
                        )}
                    </section>

                    {/* СЕКЦИЯ 3: ИТОГ И КОЭФФИЦИЕНТ */}
                    <section className="grid grid-cols-1 sm:grid-cols-2 gap-4 sm:gap-6">
                        <div className="bg-white p-5 sm:p-8 rounded-[24px] sm:rounded-[32px] shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-gray-50 flex flex-col justify-center min-h-[120px] sm:min-h-[140px] print-shadow-none">
                            <div className="flex items-center gap-2.5 sm:gap-3 mb-3 sm:mb-6">
                            <div className="p-1.5 sm:p-2 bg-blue-50 text-blue-500 rounded-full print-hide">
                                <Package className="w-4 h-4 sm:w-5 sm:h-5" />
                            </div>
                            <h3 className="text-[15px] sm:text-lg font-semibold tracking-tight text-gray-900">Сырье к закупке</h3>
                            </div>
                            <div className="flex items-baseline gap-2">
                            <span className="text-3xl sm:text-5xl font-semibold tracking-tight text-gray-900">{requiredWeight || '0.00'}</span>
                            <span className="text-base sm:text-xl font-medium text-gray-400">тонн</span>
                            </div>
                        </div>

                        <div className="bg-white p-5 sm:p-8 rounded-[24px] sm:rounded-[32px] shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-gray-50 flex flex-col justify-center min-h-[120px] sm:min-h-[140px] print-shadow-none">
                            <div className="flex items-center gap-2.5 sm:gap-3 mb-3 sm:mb-6">
                            <div className="p-1.5 sm:p-2 bg-gray-50 text-gray-500 rounded-full print-hide">
                                <Scale className="w-4 h-4 sm:w-5 sm:h-5" />
                            </div>
                            <h3 className="text-[15px] sm:text-lg font-semibold tracking-tight text-gray-900">Общий коэффициент</h3>
                            </div>
                            <div className="flex flex-col gap-1.5">
                                <div className="flex items-baseline gap-2">
                                <span className="text-3xl sm:text-5xl font-semibold tracking-tight text-blue-500">{currentCoefficient ? currentCoefficient.toFixed(3) : '--'}</span>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* СЕКЦИЯ 4: КОММЕРЧЕСКИЙ БЛОК */}
                    <section className="bg-white rounded-[24px] sm:rounded-[32px] p-5 sm:p-8 lg:p-10 shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-gray-50 space-y-5 sm:space-y-8 print-shadow-none">
                        <div className="flex items-center gap-3">
                            <div className="p-2 bg-gray-50 text-gray-900 rounded-full border border-gray-100 print-hide">
                            <Briefcase className="w-4 h-4 sm:w-5 sm:h-5" />
                            </div>
                            <h2 className="text-lg sm:text-xl font-semibold tracking-tight text-gray-900">Коммерческий расчет</h2>
                        </div>

                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 sm:gap-6 bg-[#F5F5F7]/60 p-4 sm:p-6 rounded-2xl sm:rounded-3xl border border-gray-100/50 print-shadow-none">
                            <div className="space-y-1.5">
                            <label className="block text-[12px] sm:text-[13px] font-medium text-gray-500 ml-1">Цена продажи за 1 т (без НДС)</label>
                            <div className="relative">
                                <input 
                                type="text" inputMode="decimal" placeholder="55 000" 
                                value={formatInputValue(sellPrice)} onChange={(e) => handleNumericInput(e, setSellPrice)} 
                                className="w-full bg-white border border-transparent text-gray-900 rounded-[16px] sm:rounded-2xl pl-4 sm:pl-5 pr-12 h-12 sm:h-14 text-[15px] sm:text-lg font-medium outline-none focus:ring-2 focus:ring-blue-500/40 shadow-sm transition-all print-shadow-none" 
                                />
                                <span className="absolute right-4 sm:right-5 top-1/2 -translate-y-1/2 text-gray-400 font-medium text-[13px] sm:text-sm">руб</span>
                            </div>
                            </div>
                            
                            <div className="space-y-1.5">
                            <label className="block text-[12px] sm:text-[13px] font-medium text-gray-500 ml-1">Сумма продажи заказа (без НДС)</label>
                            <div className="bg-white border border-transparent rounded-[16px] sm:rounded-2xl px-4 sm:px-5 h-12 sm:h-14 flex items-center justify-between shadow-sm print-shadow-none">
                                <span className="text-[15px] sm:text-lg font-semibold text-gray-900">{sellPrice && orderWeight ? formatCurrency(commercialStats?.sellTotal) : '0,00'}</span>
                                <span className="text-gray-400 font-medium text-[13px] sm:text-sm">руб</span>
                            </div>
                            </div>

                            <div className="space-y-1.5">
                            <label className="block text-[12px] sm:text-[13px] font-medium text-gray-500 ml-1">Сумма продажи заказа (с НДС 22%)</label>
                            <div className="bg-white border border-transparent rounded-[16px] sm:rounded-2xl px-4 sm:px-5 h-12 sm:h-14 flex items-center justify-between shadow-sm print-shadow-none">
                                <span className="text-[15px] sm:text-lg font-bold text-gray-900">{sellPrice && orderWeight ? formatCurrency(commercialStats?.sellTotalVat) : '0,00'}</span>
                                <span className="text-gray-400 font-medium text-[13px] sm:text-sm">руб</span>
                            </div>
                            </div>
                        </div>

                        {commercialStats && (
                            <div className="bg-[#0f172a] text-white p-4 sm:p-8 lg:p-10 rounded-[24px] sm:rounded-[32px] shadow-2xl space-y-6 sm:space-y-8 print-shadow-none">
                            
                            {/* РАСЧЕТ НА 1 ТОННУ ПРОДУКЦИИ */}
                            <div>
                                <h4 className="text-blue-200/60 text-[10px] sm:text-[11px] font-bold uppercase tracking-widest mb-3 sm:mb-5">Расчет на 1 тонну продукции</h4>
                                <div className="space-y-2.5 sm:space-y-3 text-[12px] sm:text-[13px]">
                                <div className="flex justify-between items-center gap-2">
                                    <span className="text-gray-200 shrink-0">Продажная цена (за 1 т):</span>
                                    <span className="font-bold text-white text-right break-words">{formatCurrency(sellPrice)} руб.</span>
                                </div>
                                <div className="flex justify-between items-center text-[#fca5a5] gap-2">
                                    <span className="shrink-0">- Стоимость заготовки:</span>
                                    <span className="text-right break-words">{currentAdminRawPrice ? `${formatCurrency(currentAdminRawPrice)} руб.` : '—'}</span>
                                </div>
                                <div className="flex justify-between items-start sm:items-center text-[#fca5a5] gap-2">
                                    <span className="shrink-0">- Потери на производство 1 т:</span>
                                    <span className="text-right break-words">{currentAdminRawPrice ? `${formatCurrency(commercialStats.lossesPerTon)} руб.` : '—'}</span>
                                </div>
                                {adminScrapPrice && Number(adminScrapPrice) > 0 && commercialStats.scrapRevenuePerTon > 0 && (
                                <div className="flex justify-between items-start sm:items-center text-[#34d399] gap-2">
                                    <span className="shrink-0">+ Возврат лома (1 т):</span>
                                    <span className="text-right break-words">{formatCurrency(commercialStats.scrapRevenuePerTon)} руб.</span>
                                </div>
                                )}
                                <div className="pt-3 sm:pt-4 mt-2 border-t border-gray-700/50 flex flex-col sm:flex-row sm:justify-between sm:items-center gap-2">
                                    <div>
                                    <span className="font-bold text-white text-[14px] sm:text-[15px] block">Маржа (1 тн, без НДС):</span>
                                    <div className="text-[9px] sm:text-[10px] text-gray-400 mt-1 sm:mt-0.5 leading-relaxed pr-2">
                                        ({formatCurrency(sellPrice)} − {formatCurrency(currentAdminRawPrice)} − {formatCurrency(commercialStats.lossesPerTon)}{adminScrapPrice && Number(adminScrapPrice) > 0 && commercialStats.scrapRevenuePerTon > 0 ? ` + ${formatCurrency(commercialStats.scrapRevenuePerTon)}` : ''})
                                    </div>
                                    </div>
                                    <div className="flex items-center gap-3 self-start sm:self-auto mt-1 sm:mt-0">
                                        <span className={`font-bold text-xl sm:text-2xl tracking-tight shrink-0 ${commercialStats.isPositive ? 'text-[#34d399]' : 'text-[#f87171]'}`}>
                                        {commercialStats.isPositive ? '+' : ''}{formatCurrency(commercialStats.profitPerTon)} руб.
                                        </span>
                                        <span className={`text-[11px] sm:text-[13px] font-bold px-2 py-1 rounded-lg bg-opacity-20 ${commercialStats.isPositive ? 'bg-[#34d399] text-[#34d399]' : 'bg-[#f87171] text-[#f87171]'}`}>
                                            {commercialStats.isPositive ? '+' : ''}{commercialStats.marginPercent.toFixed(1)}%
                                        </span>
                                    </div>
                                </div>
                                </div>
                            </div>

                            {/* РАСЧЕТ НА ВЕСЬ ЗАКАЗ */}
                            <div className="pt-2">
                                <h4 className="text-blue-200/60 text-[10px] sm:text-[11px] font-bold uppercase tracking-widest mb-3 sm:mb-5">Расчет на весь заказ ({orderWeight || 0} т)</h4>
                                <div className="space-y-2.5 sm:space-y-3 text-[12px] sm:text-[13px]">
                                <div className="flex justify-between items-center gap-2">
                                    <span className="text-gray-200 shrink-0">Общая сумма продажи:</span>
                                    <span className="font-bold text-white text-right break-words">{formatCurrency(commercialStats.sellTotal)} руб.</span>
                                </div>
                                <div className="flex justify-between items-center text-[#fca5a5] gap-2">
                                    <span className="shrink-0">- Стоимость заготовки:</span>
                                    <span className="text-right break-words">{currentAdminRawPrice && orderWeight ? `${formatCurrency(commercialStats.rawTotal)} руб.` : '—'}</span>
                                </div>
                                <div className="flex justify-between items-start sm:items-center text-[#fca5a5] gap-2">
                                    <span className="shrink-0">- Потери на весь заказ:</span>
                                    <span className="text-right break-words">{currentAdminRawPrice && orderWeight ? `${formatCurrency(commercialStats.lossesTotal)} руб.` : '—'}</span>
                                </div>
                                {adminScrapPrice && Number(adminScrapPrice) > 0 && commercialStats.scrapRevenueTotal > 0 && (
                                <div className="flex justify-between items-start sm:items-center text-[#34d399] gap-2">
                                    <span className="shrink-0">+ Возврат лома (весь заказ):</span>
                                    <span className="text-right break-words">{formatCurrency(commercialStats.scrapRevenueTotal)} руб.</span>
                                </div>
                                )}
                                <div className="pt-4 sm:pt-5 mt-2 sm:mt-3 border-t border-gray-700/50 flex flex-col sm:flex-row sm:justify-between sm:items-center gap-2 sm:gap-3">
                                    <div>
                                    <span className="font-bold text-white text-[15px] sm:text-base uppercase tracking-wider block">Итоговая маржа без НДС:</span>
                                    <div className="text-[9px] sm:text-[10px] text-gray-400 mt-1.5 sm:mt-1 leading-relaxed pr-2">
                                        ({formatCurrency(commercialStats.sellTotal)} − {formatCurrency(commercialStats.rawTotal)} − {formatCurrency(commercialStats.lossesTotal)}{adminScrapPrice && Number(adminScrapPrice) > 0 && commercialStats.scrapRevenueTotal > 0 ? ` + ${formatCurrency(commercialStats.scrapRevenueTotal)}` : ''})
                                    </div>
                                    </div>
                                    <span className={`font-black text-2xl sm:text-3xl tracking-tight self-start sm:self-auto shrink-0 mt-1.5 sm:mt-0 ${commercialStats.isPositive ? 'text-[#34d399]' : 'text-[#f87171]'}`}>
                                    {commercialStats.isPositive ? '+' : ''}{formatCurrency(commercialStats.profitTotal)} руб.
                                    </span>
                                </div>
                                </div>
                            </div>

                            {/* Блоки предупреждений и рекомендаций */}
                            <div className="space-y-3 sm:space-y-4 pt-3 sm:pt-6 print-hide">
                                
                                {/* Рекомендация по ценообразованию */}
                                {commercialStats.netLossesPerTon > 0 && (
                                <div className="bg-[#fffdf0] border border-[#fde68a] p-3.5 sm:p-6 rounded-[16px] sm:rounded-[24px]">
                                    <div className="flex items-start gap-2.5 sm:gap-4">
                                    <Info className="w-5 h-5 sm:w-6 sm:h-6 text-[#d97706] mt-0.5 shrink-0" />
                                    <div>
                                        <h5 className="text-[#92400e] font-bold text-[13px] sm:text-[15px] mb-1 sm:mb-1.5">Рекомендация по цене</h5>
                                        <p className="text-[#b45309] text-[11px] sm:text-[13px] leading-relaxed mb-2 sm:mb-4">
                                        В себестоимость ложатся чистые потери от обрезков (с учетом продажи лома): <span className="font-bold text-[#92400e]">{formatCurrency(commercialStats.netLossesPerTon)} руб.</span> на каждую тонну продукции.
                                        </p>
                                        <p className="text-[#b45309] text-[11px] sm:text-[13px] leading-relaxed mb-2 sm:mb-3">
                                        Рекомендуемая продажная цена (для компенсации чистых потерь):
                                        </p>
                                        <div className="inline-block bg-white border border-[#fcd34d] px-3 py-1.5 sm:px-4 sm:py-2.5 rounded-lg sm:rounded-xl text-[#92400e] font-bold text-[14px] sm:text-lg shadow-sm">
                                        {formatCurrency(Number(sellPrice) + Number(commercialStats.netLossesPerTon))} руб. / т
                                        </div>
                                    </div>
                                    </div>
                                </div>
                                )}

                                {/* Внимание: Низкая маржинальность */}
                                {commercialStats.profitPerTon > 0 && commercialStats.profitPerTon < 10000 && (
                                <div className="bg-[#1e0f13] border border-[#4c1d24] p-3.5 sm:p-6 rounded-[16px] sm:rounded-[24px] flex items-start gap-2.5 sm:gap-4">
                                    <AlertTriangle className="w-5 h-5 sm:w-6 sm:h-6 text-[#f87171] shrink-0 mt-0.5" />
                                    <div>
                                    <h5 className="text-[#fca5a5] font-bold text-[13px] sm:text-[15px] mb-0.5 sm:mb-1">Низкая маржинальность!</h5>
                                    <p className="text-[#fecaca]/80 text-[11px] sm:text-[13px] leading-relaxed">
                                        Прибыль составляет менее 10 000 руб. на 1 тонну (текущая: {formatCurrency(commercialStats.profitPerTon)} руб., это {commercialStats.marginPercent.toFixed(1)}%). Рекомендуется повысить цену или оптимизировать длину раскроя.
                                    </p>
                                    </div>
                                </div>
                                )}
                                
                                {/* Внимание: Убыток */}
                                {commercialStats.profitPerTon <= 0 && currentAdminRawPrice && sellPrice && (
                                <div className="bg-[#450a0a] border border-[#7f1d1d] p-3.5 sm:p-6 rounded-[16px] sm:rounded-[24px] flex items-start gap-2.5 sm:gap-4">
                                    <AlertTriangle className="w-5 h-5 sm:w-6 sm:h-6 text-red-400 shrink-0 mt-0.5" />
                                    <div>
                                    <h5 className="text-red-300 font-bold text-[13px] sm:text-[15px] mb-0.5 sm:mb-1">Сделка убыточна!</h5>
                                    <p className="text-red-200/80 text-[11px] sm:text-[13px] leading-relaxed">
                                        Сделка приносит убыток. Пересмотрите цену продажи или согласуйте с клиентом оптимальную длину для устранения отходов.
                                    </p>
                                    </div>
                                </div>
                                )}
                            </div>

                            </div>
                        )}
                    </section>

                </div>
                </div>
            );
        }

        // --- ТОЧКА ВХОДА С МАРШРУТИЗАЦИЕЙ И FIREBASE ---
        function App() {
            const [view, setView] = useState('login');
            const [user, setUser] = useState(null);
            
            // Глобальные стейты цен
            const [globalRawPrices, setGlobalRawPrices] = useState(DEFAULT_RAW_PRICES);
            const [globalScrapPrice, setGlobalScrapPrice] = useState('20000');

            // 1. Инициализация анонимной сессии (обязательно по правилам Firebase)
            useEffect(() => {
                if (!auth) return;
                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            // 2. Слушаем цены из облака в реальном времени
            useEffect(() => {
                if (!user || !db || !appId) return;

                const pricesDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'prices');
                
                const unsubscribe = onSnapshot(pricesDocRef, (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        
                        if (data.rawPrices) {
                            const loadedPrices = { ...DEFAULT_RAW_PRICES };
                            STEEL_GRADES.forEach(grade => {
                                const dbKey = sanitizeKey(grade);
                                if (data.rawPrices[dbKey] !== undefined) {
                                    loadedPrices[grade] = data.rawPrices[dbKey];
                                }
                            });
                            setGlobalRawPrices(loadedPrices);
                        }
                        if (data.scrapPrice !== undefined) {
                            setGlobalScrapPrice(data.scrapPrice);
                        }
                    }
                }, (error) => {
                    console.error("Ошибка чтения из облака:", error);
                });

                return () => unsubscribe();
            }, [user]);

            // 3. Сохранение цен в облако (для Админа)
            const handleSaveGlobal = async (rawPricesObj, scrapStr) => {
                setGlobalRawPrices(rawPricesObj);
                setGlobalScrapPrice(scrapStr);
                
                if (db && user && appId) {
                    const firestoreRawPrices = {};
                    for (const [k, v] of Object.entries(rawPricesObj)) {
                        firestoreRawPrices[sanitizeKey(k)] = v;
                    }
                    
                    const pricesDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'prices');
                    await setDoc(pricesDocRef, { rawPrices: firestoreRawPrices, scrapPrice: scrapStr }, { merge: true });
                }
            };

            if (view === 'login') {
                return (
                    <LoginScreen 
                        onManagerLogin={() => setView('manager')} 
                        onAdminLogin={() => setView('admin')} 
                    />
                );
            }

            if (view === 'admin') {
                return (
                    <AdminPanel 
                        initialRawPrices={globalRawPrices} 
                        initialScrap={globalScrapPrice} 
                        onSave={handleSaveGlobal} 
                        onLogout={() => setView('login')} 
                    />
                );
            }

            return (
                <CalculatorApp 
                    adminRawPrices={globalRawPrices} 
                    adminScrapPrice={globalScrapPrice} 
                    onLogout={() => setView('login')} 
                />
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
